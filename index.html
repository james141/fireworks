<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>马尚姚专属 🎆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .tip {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 16px;
            text-align: center;
            z-index: 10;
            text-shadow: 0 0 5px #fff;
        }
        /* 中间文字样式  */
        .center-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 32px; /* 移动端适配的字号 */
            font-weight: bold;
            text-align: center;
            z-index: 10;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff66cc, 0 0 30px #9933ff; /* 发光效果 */
            opacity: 0; /* 初始透明 */
            transition: opacity 1s ease; /* 渐变过渡 */
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="tip">目光所及是你，漫天星辰也是你 ✨</div>
    <div class="center-text" id="centerText"></div>
    <canvas id="fireworks"></canvas>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const centerText = document.getElementById('centerText');

        // 适配屏幕尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 随机数工具函数
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        // 丰富的烟花配色
        const colors = [
            '#ff0000', '#ff9900', '#ffff00', '#00ff00', '#0099ff',
            '#0033ff', '#9900ff', '#ff0099', '#ffffff', '#ff6666',
            '#66ff66', '#6666ff', '#ffff99', '#ff99ff'
        ];

        // 粒子类（烟花粒子）
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = random(1, 6);
                this.angle = random(0, Math.PI * 2);
                this.gravity = 0.06;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.color = colors[Math.floor(random(0, colors.length))];
                this.alpha = 1;
                this.decay = random(0.005, 0.015);
                this.size = random(1.5, 3);
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        let particles = [];

        // 生成烟花的函数
        function createFirework() {
            const x = random(50, canvas.width - 50);
            const y = random(50, canvas.height - 50);
            const particleCount = random(80, 150);
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // 动画循环
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return particle.alpha > 0;
            });

            requestAnimationFrame(animate);
        }

        // 启动烟花动画
        animate();
        setInterval(() => {
            createFirework();
            if (Math.random() > 0.7) {
                createFirework();
            }
        }, random(100, 300));

        // 修改后的文字播放逻辑（只播放一遍，最后一句永久显示）
        const textList = [
            '不止今夜',
            '不止烟火',
            '余生',
            '皆是你'
        ];
        let currentIndex = 0;
        const showDuration = 3000; // 每句显示时长
        const fadeDuration = 1000; // 渐变时长

        function showText() {
            // 设置当前要显示的文字
            centerText.textContent = textList[currentIndex];
            // 渐变显示文字
            centerText.style.opacity = 1;

            // 判断是否是最后一句
            if (currentIndex === textList.length - 1) {
                // 最后一句：显示后不再消失，终止循环
                return;
            }

            // 非最后一句：显示指定时长后渐变消失，然后切换下一句
            setTimeout(() => {
                centerText.style.opacity = 0;
                setTimeout(() => {
                    currentIndex++;
                    showText(); // 继续播放下一句
                }, fadeDuration);
            }, showDuration);
        }

        // 启动文字播放
        showText();
    </script>
</body>
</html>
