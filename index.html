<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>马尚姚，我的浪漫只属于你 🎆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* 爆炸闪光层（覆盖整个屏幕） */
        .flash-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff;
            opacity: 0; 
            pointer-events: none; 
            z-index: 5; 
            transition: opacity 0.15s ease-out, background 0.1s ease;
        }
        /* 中间文字样式  */
        .center-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 36px; 
            font-weight: bold;
            text-align: center;
            z-index: 10;
            text-shadow: 
                0 0 10px #fff, 
                0 0 20px #ff66cc, 
                0 0 30px #9933ff,
                0 0 40px #6699ff,
                0 0 50px #ff3366; 
            opacity: 0; 
            transition: opacity 1.2s ease-in-out; 
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="flash-layer" id="flashLayer"></div>
    <div class="center-text" id="centerText"></div>
    <canvas id="fireworks"></canvas>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const centerText = document.getElementById('centerText');
        const flashLayer = document.getElementById('flashLayer');

        // 核心：音频解锁标记（初始未解锁）
        let audioUnlocked = false;
        // 音频上下文（全局复用）
        let audioCtx = null;
        // 预加载的烟花爆炸音效缓冲区（存储多段真实音效）
        let fireworkBuffers = [];
        // 新增：流星存储数组
        let meteors = [];

        // 适配屏幕尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 随机数工具函数
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        // 烟花配色
        const colors = [
            '#ff0000', '#ff9900', '#ffff00', '#00ff00', '#0099ff',
            '#0033ff', '#9900ff', '#ff0099', '#ffffff', '#ff6666',
            '#66ff66', '#6666ff', '#ffff99', '#ff99ff', '#ff33cc',
            '#33ffff', '#99ff99', '#ffcc33', '#cc33ff', '#33ccff'
        ];

        // 星光背景
        class Star {
            constructor() {
                this.x = random(0, canvas.width);
                this.y = random(0, canvas.height);
                this.size = random(0.5, 2);
                this.alpha = random(0.2, 1);
                this.blinkSpeed = random(0.005, 0.015);
            }
            update() {
                this.alpha += Math.sin(Date.now() * this.blinkSpeed) * 0.01;
                this.alpha = Math.max(0.2, Math.min(1, this.alpha));
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        let stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push(new Star());
        }

        // 新增：流星类（逼真效果 + 固定右上到左下轨迹）
        class Meteor {
            constructor() {
                // 起点：屏幕右方偏上
                this.startX = random(canvas.width * 0.8, canvas.width * 1.2);
                this.startY = random(0, canvas.height * 0.3);
                // 终点：屏幕左方偏下
                this.endX = random(-canvas.width * 0.2, canvas.width * 0.2);
                this.endY = random(canvas.height * 0.7, canvas.height);
                
                // 当前位置
                this.x = this.startX;
                this.y = this.startY;
                
                // 流星属性（逼真优化）
                this.speed = random(8, 14); // 流星速度
                this.length = random(80, 150); // 流星拖尾长度
                this.alpha = random(0.6, 1); // 初始透明度
                this.trail = []; // 拖尾轨迹
                this.trailMax = 15; // 拖尾节点数
                
                // 计算移动方向向量
                const dx = this.endX - this.startX;
                const dy = this.endY - this.startY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                this.vx = (dx / dist) * this.speed;
                this.vy = (dy / dist) * this.speed;
            }

            update() {
                // 记录拖尾
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailMax) {
                    this.trail.shift();
                }

                // 移动流星
                this.x += this.vx;
                this.y += this.vy;

                // 中途不消失，仅飞出屏幕后移除
                return this.x > -50 && this.x < canvas.width + 50 && this.y > -50 && this.y < canvas.height + 50;
            }

            draw() {
                ctx.save();
                // 流星主体颜色：淡蓝白（更逼真）
                ctx.strokeStyle = '#e6f7ff';
                ctx.lineCap = 'round'; // 圆润线头
                ctx.globalAlpha = this.alpha;

                // 绘制拖尾（渐隐效果，头部亮尾部淡）
                for (let i = 0; i < this.trail.length; i++) {
                    const trail = this.trail[i];
                    const nextTrail = this.trail[i + 1];
                    if (nextTrail) {
                        // 拖尾宽度递减 + 透明度递减
                        ctx.lineWidth = (i / this.trailMax) * 3;
                        ctx.globalAlpha = this.alpha * (i / this.trailMax);
                        ctx.beginPath();
                        ctx.moveTo(trail.x, trail.y);
                        ctx.lineTo(nextTrail.x, nextTrail.y);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }
        }

        // 新增：生成流星群（2-3颗成群，先后出现）
        function createMeteorShower() {
            const meteorCount = Math.floor(random(2, 4)); // 2-3颗
            for (let i = 0; i < meteorCount; i++) {
                // 每颗流星间隔100-300ms，模拟先后出现
                setTimeout(() => {
                    meteors.push(new Meteor());
                }, i * random(100, 300));
            }
        }

        // 粒子类
        class Particle {
            constructor(x, y, type = 'normal') {
                this.x = x;
                this.y = y;
                this.type = type;
                this.speed = this.type === 'huge' ? random(3, 8) : random(1, 6);
                this.angle = random(0, Math.PI * 2);
                this.gravity = this.type === 'huge' ? 0.08 : 0.06;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.color = colors[Math.floor(random(0, colors.length))];
                this.alpha = 1;
                this.decay = this.type === 'huge' ? random(0.008, 0.02) : random(0.005, 0.015);
                this.size = this.type === 'huge' ? random(2, 4) : random(1.5, 3);
                this.trail = [];
                this.trailLength = this.type === 'huge' ? 8 : 5;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                this.vx *= 0.97;
                this.vy *= 0.97;
                if (this.type === 'heart') {
                    const t = this.angle;
                    this.vx = 16 * Math.pow(Math.sin(t), 3) * 0.5;
                    this.vy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.5;
                }
            }

            draw() {
                for (let i = 0; i < this.trail.length; i++) {
                    const trail = this.trail[i];
                    const trailAlpha = trail.alpha * (i / this.trailLength);
                    ctx.save();
                    ctx.globalAlpha = trailAlpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(trail.x, trail.y, this.size * (i / this.trailLength), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                if (this.type === 'heart' && Math.random() > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.size/2);
                    ctx.bezierCurveTo(
                        this.x - this.size/2, this.y - this.size/2,
                        this.x - this.size*2, this.y + this.size/2,
                        this.x, this.y + this.size*1.5
                    );
                    ctx.bezierCurveTo(
                        this.x + this.size*2, this.y + this.size/2,
                        this.x + this.size/2, this.y - this.size/2,
                        this.x, this.y + this.size/2
                    );
                    ctx.fill();
                } else if (Math.random() > 0.7) {
                    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // 烟花升空轨迹类
        class FireworkTrail {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.targetY = random(canvas.height/4, canvas.height/2);
                this.speed = random(8, 15);
                this.alpha = 1;
                this.color = colors[Math.floor(random(0, colors.length))];
            }
            update() {
                this.y -= this.speed;
                this.alpha -= 0.01;
                return this.y > this.targetY;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, canvas.height);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
                ctx.restore();
            }
        }

        // 爆炸闪光效果函数
        function triggerFlash(x, y) {
            const flashOpacity = x === 'huge' ? 0.3 : random(0.1, 0.2);
            const flashColor = `rgba(255, 255, 255, ${flashOpacity})`;
            flashLayer.style.background = flashColor;
            flashLayer.style.opacity = flashOpacity;
            setTimeout(() => {
                flashLayer.style.opacity = 0;
                flashLayer.style.background = 'rgba(255,255,255,0)';
            }, 150);
        }

        // 预加载真实烟花音效（核心修改：替换成真实音频）
        async function loadFireworkSounds() {
            if (!audioCtx) return;
            
            // 真实烟花爆炸音效的在线资源（稳定可用）
            const soundUrls = [
                'https://assets.mixkit.co/sfx/preview/mixkit-firework-explosion-1692.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-firework-pop-1691.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-firework-whistle-explosion-1694.mp3'
            ];

            // 加载所有音效缓冲区
            for (const url of soundUrls) {
                try {
                    const response = await fetch(url);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    fireworkBuffers.push(audioBuffer);
                } catch (e) {
                    console.log("加载音效失败：", e);
                }
            }
        }

        // 播放真实烟花爆炸音效
        function playFireworkSound() {
            // 未解锁或未加载音效则跳过
            if (!audioUnlocked || !audioCtx || fireworkBuffers.length === 0) return;
            
            try {
                // 随机选择一段音效（更真实）
                const randomBuffer = fireworkBuffers[Math.floor(random(0, fireworkBuffers.length))];
                const source = audioCtx.createBufferSource();
                const gainNode = audioCtx.createGain();

                source.buffer = randomBuffer;
                source.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                // 调整音量（避免过大）
                gainNode.gain.value = 0.3;
                // 超大烟花音量稍大
                if (Math.random() > 0.7) {
                    gainNode.gain.value = 0.5;
                }

                source.start();
            } catch (e) {
                console.log("播放音效失败：", e);
            }
        }

        // 解锁音频的函数（用户点击后执行）
        function unlockAudio(e) {
            if (audioUnlocked) return; // 已解锁则跳过
            
            // 创建音频上下文（首次点击才创建）
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                audioCtx = new AudioContext();
                // 播放静音解锁（兼容部分机型）
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 0;
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.01);
                
                audioUnlocked = true;
                // 解锁后立即加载音效
                loadFireworkSounds();
                
                // 解锁后反馈（烟花+闪光+音效）
                playFireworkSound();
                triggerFlash('huge');
                const x = e.clientX || e.touches[0].clientX;
                const y = e.clientY || e.touches[0].clientY;
                for (let i = 0; i < 100; i++) {
                    particles.push(new Particle(x, y, 'heart'));
                }
            }
            
            // 移除监听避免重复触发
            canvas.removeEventListener('click', unlockAudio);
            canvas.removeEventListener('touchstart', unlockAudio);
        }

        // 监听首次点击/触摸解锁音频
        canvas.addEventListener('click', unlockAudio);
        canvas.addEventListener('touchstart', unlockAudio);

        let particles = [];
        let fireworkTrails = [];

        // 生成烟花
        function createFirework(type = 'normal') {
            const x = random(50, canvas.width - 50);
            const y = canvas.height;
            const trail = new FireworkTrail(x, y);
            fireworkTrails.push(trail);

            setTimeout(() => {
                const particleCount = type === 'huge' ? 200 : random(80, 150);
                const fireworkType = Math.random() > 0.8 ? 'heart' : type;
                triggerFlash(type);
                
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(x, trail.y, fireworkType));
                }
                playFireworkSound(); // 播放真实音效
            }, 800);
        }

        // 动画循环
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // 新增：更新并绘制流星
            meteors = meteors.filter(meteor => {
                const isVisible = meteor.update();
                meteor.draw();
                return isVisible;
            });

            fireworkTrails = fireworkTrails.filter(trail => {
                const isFlying = trail.update();
                trail.draw();
                return isFlying;
            });

            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return particle.alpha > 0;
            });

            requestAnimationFrame(animate);
        }

        // 启动烟花动画
        animate();
        setInterval(() => {
            const type = Math.random() > 0.7 ? 'huge' : 'normal';
            createFirework(type);
            if (Math.random() > 0.8) {
                createFirework();
            }
        }, random(200, 500));

        // 新增：定时触发流星群（5-10秒随机出现）
        setInterval(createMeteorShower, random(5000, 10000));

        // 点击触发超大心形烟花
        function triggerBigFirework(e) {
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            
            triggerFlash('huge');
            for (let i = 0; i < 250; i++) {
                particles.push(new Particle(x, y, 'heart'));
            }
            playFireworkSound();
        }
        canvas.addEventListener('click', triggerBigFirework);
        canvas.addEventListener('touchstart', triggerBigFirework);

        // 文字播放逻辑
        const textList = [
            '我为你放了一场烟花',
            '在屏幕这头 悄悄点亮',
            '那些绽开的光',
            '像不像你最近常常提起的',
            '闪闪发亮的远方',
            '我知道你每天复习到十点',
            '台灯下 和密密麻麻的笔记对坐',
            '偶尔也会累吧',
            '像烟花升空前的沉默',
            '积蓄着 等待着',
            '可你低头努力的样子',
            '本身就是一束光',
            '终会在这个夏天',
            '嘭的一声',
            '把梦想炸得满天明亮',
            '别急',
            '每一朵烟花都曾是一颗普通的火药',
            '熬过了黑暗 耐住了燃烧',
            '才换来夜空里的那几秒闪耀',
            '你也是',
            '去奔赴你的云端吧',
            '我会一直在你身旁',
            '看着你 慢慢升空 然后发光'
        ];
        let currentIndex = 0;
        const showDuration = 3500;
        const fadeDuration = 1200;

        function showText() {
            centerText.textContent = textList[currentIndex];
            centerText.style.opacity = 1;

            if (currentIndex === textList.length - 1) {
                centerText.style.transition = 'all 1.5s ease-in-out';
                centerText.style.fontSize = '40px';
                return;
            }

            setTimeout(() => {
                centerText.style.opacity = 0;
                setTimeout(() => {
                    currentIndex++;
                    showText();
                }, fadeDuration);
            }, showDuration);
        }
        showText();
    </script>
</body>
</html>
